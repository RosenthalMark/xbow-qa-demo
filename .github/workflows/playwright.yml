name: Playwright Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start local OWASP Juice Shop
        run: docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop

      - name: Wait for Juice Shop to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 >/dev/null; then
              echo "Juice Shop is reachable"
              exit 0
            fi
            sleep 2
          done
          echo "Juice Shop did not become ready in time"
          docker logs juice-shop || true
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test --grep-invert @quarantine

      - name: Stop Juice Shop
        if: always()
        run: docker rm -f juice-shop || true

  quarantine-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: playwright
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start local OWASP Juice Shop
        run: docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop

      - name: Wait for Juice Shop to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 >/dev/null; then
              echo "Juice Shop is reachable"
              exit 0
            fi
            sleep 2
          done
          echo "Juice Shop did not become ready in time"
          docker logs juice-shop || true
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run quarantined tests (non-blocking)
        run: npx playwright test --grep @quarantine --pass-with-no-tests

      - name: Stop Juice Shop
        if: always()
        run: docker rm -f juice-shop || true
